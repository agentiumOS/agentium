name: Publish to npm

on:
  push:
    tags:
      - "v*"
  # Allow manually re-firing this workflow (e.g. when GitHub silently
  # drops the tag-push trigger, as happened for v2.2.0). The input is
  # the tag name to publish — must already exist on the repo.
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to publish (e.g. v2.2.1). Tag must already exist on the repo.'
        required: true
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: Prod
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          # When triggered manually via workflow_dispatch, check out the
          # supplied tag. On the normal tag-push trigger, GitHub already
          # checks out the tag's SHA, so `ref` is empty / ignored.
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        # Delete the lockfile (generated on macOS, missing Linux native
        # bindings like @rollup/rollup-linux-x64-gnu) and re-resolve on the
        # Linux runner. See https://github.com/npm/cli/issues/4828
        run: |
          rm -f package-lock.json
          npm install --legacy-peer-deps --include=optional

      - name: Build packages
        run: npm run build

      - name: Publish @agentium/core
        run: npm publish --workspace=packages/core --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @agentium/transport
        run: npm publish --workspace=packages/transport --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @agentium/queue
        run: npm publish --workspace=packages/queue --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @agentium/browser
        run: npm publish --workspace=packages/browser --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @agentium/admin
        run: npm publish --workspace=packages/admin --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @agentium/edge
        run: npm publish --workspace=packages/edge --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @agentium/observability
        run: npm publish --workspace=packages/observability --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @agentium/eval
        run: npm publish --workspace=packages/eval --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @agentium/cli
        run: npm publish --workspace=packages/cli --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Extract version from tag
        id: version
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          echo "TAG=$TAG" >> $GITHUB_OUTPUT
          echo "VERSION=${TAG#v}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Agentium v${{ steps.version.outputs.VERSION }}
          tag_name: ${{ steps.version.outputs.TAG }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
