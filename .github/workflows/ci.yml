name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        # `npm install` (not `npm ci`) so that platform-specific optional
        # dependencies (e.g. @rollup/rollup-linux-x64-gnu) resolve on the
        # Linux runner even when the lockfile was generated on macOS.
        # See https://github.com/npm/cli/issues/4828
        run: npm install --legacy-peer-deps --include=optional

      - name: Build packages
        run: npm run build

      - name: Lint & format check
        run: npx biome ci .

      - name: Run tests
        run: npx vitest run
