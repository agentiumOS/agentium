name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        # Delete the lockfile (generated on macOS, missing Linux native
        # bindings like @rollup/rollup-linux-x64-gnu) and re-resolve on the
        # Linux runner. See https://github.com/npm/cli/issues/4828
        run: |
          rm -f package-lock.json
          npm install --legacy-peer-deps --include=optional

      - name: Build packages
        run: npm run build

      - name: Lint & format check
        run: npx biome ci .

      - name: Run tests
        run: npx vitest run
